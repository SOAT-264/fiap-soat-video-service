name: Test and Deploy

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage gate
        run: python -m pytest

  build-and-deploy:
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - pc-wee
      - X64
    timeout-minutes: 35
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout service repository
        uses: actions/checkout@v4
        with:
          path: fiap-soat-video-service

      - name: Checkout shared repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-shared
          path: fiap-soat-video-shared

      - name: Checkout local-dev repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-local-dev
          path: fiap-soat-video-local-dev

      - name: Checkout observability repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-obs
          path: fiap-soat-video-obs

      - name: Validate runner tooling
        working-directory: ${{ github.workspace }}
        run: |
          $requiredCommands = @("docker", "git", "kubectl", "awslocal")

          foreach ($command in $requiredCommands) {
              if (-not (Get-Command $command -ErrorAction SilentlyContinue)) {
                  throw "Command '$command' was not found on the runner."
              }
          }

          docker version
          docker compose version
          kubectl version --client
          kubectl cluster-info

      - name: Cleanup conflicting observability containers
        run: |
          $containers = @(
            "vp-prometheus",
            "vp-grafana",
            "vp-loki",
            "vp-blackbox-exporter"
          )

          foreach ($container in $containers) {
            $existing = docker ps -a --filter "name=^/$container$" --format "{{.ID}}"

            if (-not [string]::IsNullOrWhiteSpace($existing)) {
              docker rm -f $container *> $null
            }
          }

      - name: Start local base infrastructure
        working-directory: ${{ github.workspace }}/fiap-soat-video-local-dev
        run: docker compose up -d --remove-orphans

      - name: Initialize LocalStack resources
        working-directory: ${{ github.workspace }}/fiap-soat-video-local-dev/scripts/windows
        run: .\localstack-init.ps1

      - name: Build local service image
        working-directory: ${{ github.workspace }}
        run: docker build -t fiap-soat-video-service:local -f fiap-soat-video-service/Dockerfile .

      - name: Apply service local-dev manifests
        working-directory: ${{ github.workspace }}/fiap-soat-video-service
        run: |
          kubectl apply -k k8s/overlays/local-dev
          kubectl rollout restart deployment/video-api-service -n video-processor
          kubectl rollout status deployment/video-api-service -n video-processor --timeout=180s

      - name: Reload Traefik and Prometheus
        working-directory: ${{ github.workspace }}/fiap-soat-video-local-dev
        run: docker compose restart traefik prometheus

      - name: Verify deployed service API health
        run: |
          $response = Invoke-WebRequest -Uri http://localhost:32516/health -UseBasicParsing

          if ($response.StatusCode -ne 200) {
              throw "Video service API health check failed with status code $($response.StatusCode)."
          }